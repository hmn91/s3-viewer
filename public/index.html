<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S3 File Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== VIEW: PROJECT LIST ===== -->
  <div id="view-projects">
    <header class="header">
      <h1 class="header-title">S3 File Viewer</h1>
    </header>
    <div class="project-list-toolbar">
      <div class="project-search-wrap">
        <input id="project-search" type="search" placeholder="🔍 Search…" class="global-search-input" />
        <select id="project-search-type" class="select-control">
          <option value="all">All</option>
          <option value="project">Project name</option>
          <option value="file">File in project</option>
          <option value="source">Source (name/URL)</option>
          <option value="tag">Tag name</option>
        </select>
      </div>
      <button id="btn-new-project" class="btn btn-primary">+ New Project</button>
    </div>
    <div id="project-list-container" class="project-list-container"></div>
    <div id="search-results-container" class="search-results-container hidden"></div>
  </div>

  <!-- ===== VIEW: PROJECT DETAIL (file viewer) ===== -->
  <div id="view-project-detail" class="hidden">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <button id="btn-back-to-projects" class="btn btn-secondary">← Projects</button>
      <h1 class="header-title" id="project-detail-title">Project</h1>
    </div>
    <div class="header-actions">
      <button id="btn-manage-tags" class="btn btn-secondary">🏷 Tags</button>
      <button id="btn-manage-sources" class="btn btn-secondary">⚙ Manage Sources</button>
    </div>
  </header>

  <!-- ===== STICKY SUBHEADER: toolbar + stats bar stick below fixed header ===== -->
  <div class="sticky-subheader">

  <!-- ===== TOOLBAR ===== -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="btn-fetch-all" class="btn btn-primary">⬇ Fetch All</button>
      <button id="btn-show-hidden" class="btn btn-secondary hidden">Show hidden (<span id="hidden-count">0</span>)</button>

      <!-- Source multi-select dropdown (Excel-like) -->
      <div id="source-dropdown" class="source-dropdown hidden">
        <button id="btn-source-dropdown" class="btn btn-secondary">
          Sources <span id="source-dropdown-count"></span> ▼
        </button>
        <div id="source-dropdown-panel" class="source-dropdown-panel hidden">
          <input id="source-search-input" type="text" placeholder="Filter sources…" class="source-search-input" />
          <div class="source-dropdown-actions">
            <button id="btn-select-all-sources" class="btn btn-sm btn-secondary">Select All</button>
            <button id="btn-deselect-all-sources" class="btn btn-sm btn-secondary">Deselect All</button>
          </div>
          <div id="source-dropdown-list" class="source-dropdown-list"></div>
          <div class="source-dropdown-footer">
            <button id="btn-apply-source-filter" class="btn btn-sm btn-primary">Apply</button>
          </div>
        </div>
      </div>

      <!-- Tag filter dropdown -->
      <div id="tag-filter-dropdown" class="source-dropdown hidden">
        <button id="btn-tag-filter-dropdown" class="btn btn-secondary">
          Tags <span id="tag-filter-count"></span> ▼
        </button>
        <div id="tag-filter-panel" class="source-dropdown-panel hidden">
          <input id="tag-search-input" type="text" placeholder="Filter tags…" class="source-search-input" />
          <div class="source-dropdown-actions">
            <button id="btn-select-all-tags" class="btn btn-sm btn-secondary">Select All</button>
            <button id="btn-deselect-all-tags" class="btn btn-sm btn-secondary">Deselect All</button>
          </div>
          <div id="tag-filter-list" class="source-dropdown-list"></div>
          <div class="source-dropdown-footer">
            <button id="btn-apply-tag-filter" class="btn btn-sm btn-primary">Apply</button>
          </div>
        </div>
      </div>

      <span class="toolbar-label">View:
        <label class="radio-label"><input type="radio" name="view-mode" value="all" checked /> All</label>
        <label class="radio-label"><input type="radio" name="view-mode" value="by-source" /> By Source</label>
      </span>
    </div>
    <div class="toolbar-right">
      <input id="global-search" type="search" placeholder="🔍 Search filenames…" class="global-search-input" />
      <span id="last-fetch-label" class="muted-text">Not fetched yet</span>
    </div>
  </div>

  <!-- ===== STATS BAR ===== -->
  <div id="stats-bar" class="stats-bar hidden">
    <span id="stat-total"></span>
    <span id="stat-new"></span>
    <span id="stat-sources"></span>
  </div>

  </div><!-- end .sticky-subheader -->

  <!-- ===== ERROR BANNER ===== -->
  <div id="error-banner" class="error-banner hidden"></div>

  <!-- ===== MAIN CONTENT ===== -->
  <main id="main-content">
    <div class="empty-state">Add sources via ⚙ Manage Sources, then click ⬇ Fetch All.</div>
  </main>

  </div><!-- end #view-project-detail -->

  <!-- ===== MANAGE SOURCES MODAL ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Manage Sources</h2>
        <button id="btn-close-modal" class="btn-icon" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="add-source-form">
          <input id="input-label" type="text" placeholder="Label (e.g. Documents)" class="input-control" />
          <input id="input-url" type="url" placeholder="S3 Bucket URL (https://...)" class="input-control input-url" />
          <button id="btn-add-source" class="btn btn-primary">Add</button>
        </div>
        <div id="add-source-error" class="form-error hidden"></div>
        <div id="sources-list" class="sources-list">
          <div class="muted-text">Loading sources…</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== TAG MANAGER MODAL ===== -->
  <div id="tag-modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Manage Tags</h2>
        <button id="btn-close-tag-modal" class="btn-icon" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="add-tag-form">
          <input id="input-tag-name" type="text" placeholder="Tag name…" class="input-control" />
          <div id="tag-color-picker" class="tag-color-picker"></div>
          <button id="btn-add-tag" class="btn btn-primary">Add Tag</button>
        </div>
        <div id="add-tag-error" class="form-error hidden"></div>
        <div id="tags-list" class="tags-list"></div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
